name: Build macOS App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build release app
        run: |
          xcodebuild \
            -project AIStash.xcodeproj \
            -scheme AIStash \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          set -euo pipefail

          APP_PATH="$GITHUB_WORKSPACE/build/Build/Products/Release/AIStash.app"
          DMG_STAGE="$RUNNER_TEMP/AIStash-dmg"
          DMG_PATH="$GITHUB_WORKSPACE/AIStash-macOS.dmg"

          test -d "$APP_PATH"

          rm -rf "$DMG_STAGE"
          mkdir -p "$DMG_STAGE"
          cp -R "$APP_PATH" "$DMG_STAGE/"
          ln -s /Applications "$DMG_STAGE/Applications"

          hdiutil create \
            -volname "AIStash" \
            -srcfolder "$DMG_STAGE" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AIStash-macOS
          path: |
            AIStash-macOS.dmg
          if-no-files-found: error

      - name: Publish rolling prerelease
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: latest-main
          prerelease: true
          title: Latest main build
          files: |
            AIStash-macOS.dmg
