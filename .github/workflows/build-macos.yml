name: Build macOS App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build release app
        run: |
          xcodebuild \
            -project AIStash.xcodeproj \
            -scheme AIStash \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Compute package metadata
        id: metadata
        run: |
          RELEASE_DATE="$(date -u +%F)"
          DMG_NAME="AIStash-${RELEASE_DATE}.dmg"
          RELEASE_TAG="release-${RELEASE_DATE}"

          echo "release_date=$RELEASE_DATE" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Package app
        run: |
          set -euo pipefail

          APP_PATH="$GITHUB_WORKSPACE/build/Build/Products/Release/AIStash.app"
          DMG_STAGE="$RUNNER_TEMP/AIStash-dmg"
          DMG_PATH="$GITHUB_WORKSPACE/${{ steps.metadata.outputs.dmg_name }}"

          test -d "$APP_PATH"

          rm -rf "$DMG_STAGE"
          mkdir -p "$DMG_STAGE"
          cp -R "$APP_PATH" "$DMG_STAGE/"
          ln -s /Applications "$DMG_STAGE/Applications"

          hdiutil create \
            -volname "AIStash" \
            -srcfolder "$DMG_STAGE" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AIStash-macOS-${{ steps.metadata.outputs.release_date }}
          path: |
            ${{ steps.metadata.outputs.dmg_name }}
          if-no-files-found: error

      - name: Publish dated release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.release_tag }}
          name: AIStash ${{ steps.metadata.outputs.release_date }}
          generate_release_notes: true
          files: |
            ${{ steps.metadata.outputs.dmg_name }}
