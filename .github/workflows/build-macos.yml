name: Build macOS App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sign-notarize:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate signing secrets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail

          for secret_name in \
            BUILD_CERTIFICATE_BASE64 \
            P12_PASSWORD \
            KEYCHAIN_PASSWORD \
            SIGNING_IDENTITY \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER_ID \
            APPLE_API_PRIVATE_KEY_BASE64
          do
            if [ -z "${!secret_name:-}" ]; then
              echo "Missing required secret: $secret_name" >&2
              exit 1
            fi
          done

      - name: Install Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Build release app
        run: |
          set -euo pipefail

          xcodebuild \
            -project AIStash.xcodeproj \
            -scheme AIStash \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Compute package metadata
        id: metadata
        run: |
          set -euo pipefail

          RELEASE_DATE="$(date -u +%F)"
          RELEASE_TAG="release-${RELEASE_DATE}"
          APP_PATH="$GITHUB_WORKSPACE/build/Build/Products/Release/AIStash.app"
          BUNDLE_PLIST="$APP_PATH/Contents/Info.plist"
          APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$BUNDLE_PLIST")
          BUILD_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$BUNDLE_PLIST")
          DMG_NAME="AIStash-${RELEASE_DATE}.dmg"

          echo "release_date=$RELEASE_DATE" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Sign app bundle
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          APP_PATH="$GITHUB_WORKSPACE/build/Build/Products/Release/AIStash.app"

          codesign \
            --force \
            --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --timestamp \
            --deep \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Prepare notarization key
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/private_keys"
          KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

      - name: Package and sign DMG
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          APP_PATH="$GITHUB_WORKSPACE/build/Build/Products/Release/AIStash.app"
          DMG_STAGE="$RUNNER_TEMP/AIStash-dmg"
          DMG_PATH="$GITHUB_WORKSPACE/${{ steps.metadata.outputs.dmg_name }}"

          rm -rf "$DMG_STAGE"
          mkdir -p "$DMG_STAGE"
          cp -R "$APP_PATH" "$DMG_STAGE/"
          ln -s /Applications "$DMG_STAGE/Applications"

          hdiutil create \
            -volname "AIStash" \
            -srcfolder "$DMG_STAGE" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          codesign \
            --force \
            --sign "$SIGNING_IDENTITY" \
            --timestamp \
            "$DMG_PATH"

          codesign --verify --verbose=2 "$DMG_PATH"

      - name: Notarize and staple app + DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail

          APP_PATH="$GITHUB_WORKSPACE/build/Build/Products/Release/AIStash.app"
          DMG_PATH="$GITHUB_WORKSPACE/${{ steps.metadata.outputs.dmg_name }}"
          KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"

          xcrun notarytool submit "$DMG_PATH" \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type execute --verbose=2 "$APP_PATH"
          spctl --assess --type open --verbose=2 "$DMG_PATH"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIStash-macOS-${{ steps.metadata.outputs.release_date }}
          path: |
            ${{ steps.metadata.outputs.dmg_name }}
          if-no-files-found: error

      - name: Publish dated release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.release_tag }}
          name: AIStash ${{ steps.metadata.outputs.release_date }}
          generate_release_notes: true
          files: |
            ${{ steps.metadata.outputs.dmg_name }}
